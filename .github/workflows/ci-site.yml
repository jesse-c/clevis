name: "CI / Site"

on:
  push:
    paths:
      - "site/**"
      - ".github/workflows/ci-site.yml"
  pull_request:
    branches: [main]

env:
  MIX_ENV: test

defaults:
  run:
    working-directory: site

jobs:
  setup:
    runs-on: ubuntu-24.04
    name: Setup
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Elixir and Erlang
        uses: erlef/setup-beam@v1
        with:
          install-hex: true
          install-rebar: true
          version-type: strict
          version-file: site/.tool-versions

      - name: Cache deps
        id: cache-deps
        uses: actions/cache@v5
        env:
          cache-name: cache-elixir-deps
        with:
          path: site/deps
          key: ${{ runner.os }}-mix-${{ env.cache-name }}-${{ hashFiles('site/mix.lock') }}
          restore-keys: |
            ${{ runner.os }}-mix-${{ env.cache-name }}-

      - name: Cache compiled build
        id: cache-build
        uses: actions/cache@v5
        env:
          cache-name: cache-compiled-build
        with:
          path: site/_build
          key: ${{ runner.os }}-mix-${{ env.cache-name }}-${{ hashFiles('site/mix.lock') }}
          restore-keys: |
            ${{ runner.os }}-mix-${{ env.cache-name }}-
            ${{ runner.os }}-mix-

      - name: Install dependencies
        run: mix deps.get

  build:
    runs-on: ubuntu-24.04
    name: Build
    needs: setup
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Elixir and Erlang
        uses: erlef/setup-beam@v1
        with:
          install-hex: true
          install-rebar: true
          version-type: strict
          version-file: site/.tool-versions

      - name: Cache deps
        uses: actions/cache@v5
        env:
          cache-name: cache-elixir-deps
        with:
          path: site/deps
          key: ${{ runner.os }}-mix-${{ env.cache-name }}-${{ hashFiles('site/mix.lock') }}
          restore-keys: |
            ${{ runner.os }}-mix-${{ env.cache-name }}-

      - name: Cache compiled build
        uses: actions/cache@v5
        env:
          cache-name: cache-compiled-build
        with:
          path: site/_build
          key: ${{ runner.os }}-mix-${{ env.cache-name }}-${{ hashFiles('site/mix.lock') }}
          restore-keys: |
            ${{ runner.os }}-mix-${{ env.cache-name }}-
            ${{ runner.os }}-mix-

      - name: Compile without warnings
        run: mix compile --warnings-as-errors

  test:
    runs-on: ubuntu-24.04
    name: Test
    needs: build
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Elixir and Erlang
        uses: erlef/setup-beam@v1
        with:
          install-hex: true
          install-rebar: true
          version-type: strict
          version-file: site/.tool-versions

      - name: Cache deps
        uses: actions/cache@v5
        env:
          cache-name: cache-elixir-deps
        with:
          path: site/deps
          key: ${{ runner.os }}-mix-${{ env.cache-name }}-${{ hashFiles('site/mix.lock') }}
          restore-keys: |
            ${{ runner.os }}-mix-${{ env.cache-name }}-

      - name: Cache compiled build
        uses: actions/cache@v5
        env:
          cache-name: cache-compiled-build
        with:
          path: site/_build
          key: ${{ runner.os }}-mix-${{ env.cache-name }}-${{ hashFiles('site/mix.lock') }}
          restore-keys: |
            ${{ runner.os }}-mix-${{ env.cache-name }}-
            ${{ runner.os }}-mix-

      - name: Run tests
        run: mix test

  lint:
    runs-on: ubuntu-24.04
    name: Lint
    needs: build
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Elixir and Erlang
        uses: erlef/setup-beam@v1
        with:
          install-hex: true
          install-rebar: true
          version-type: strict
          version-file: site/.tool-versions

      - name: Cache deps
        uses: actions/cache@v5
        env:
          cache-name: cache-elixir-deps
        with:
          path: site/deps
          key: ${{ runner.os }}-mix-${{ env.cache-name }}-${{ hashFiles('site/mix.lock') }}
          restore-keys: |
            ${{ runner.os }}-mix-${{ env.cache-name }}-

      - name: Cache compiled build
        uses: actions/cache@v5
        env:
          cache-name: cache-compiled-build
        with:
          path: site/_build
          key: ${{ runner.os }}-mix-${{ env.cache-name }}-${{ hashFiles('site/mix.lock') }}
          restore-keys: |
            ${{ runner.os }}-mix-${{ env.cache-name }}-
            ${{ runner.os }}-mix-

      - name: Check formatting
        run: mix format --check-formatted

      - name: Check code analysis
        run: mix credo --all

      - name: Check spelling
        uses: crate-ci/typos@master
        with:
          working-directory: "."
